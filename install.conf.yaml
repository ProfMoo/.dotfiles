- defaults:
    link:
      create: true
      relink: true
- clean:
    ~/:
      force: true
    ~/.config:
      recursive: true
- shell:
    - description: Installing submodules
      command: git submodule update --init --recursive
      stdin: true
      stdout: true
      stderr: true
    - description: Installing CLI tools & GUI programs
      command: scripts/install_tools
      stdin: true
      stdout: true
      stderr: true
    - description: Installing zsh
      command: bash scripts/install_zsh
      stdin: true
      stdout: true
      stderr: true
    - description: Update macOS settings
      command: scripts/macos_settings
      stdin: true
      stdout: true
      stderr: true
    - description: Downloading zsh plugins
      command: bash scripts/download_zsh_plugins
      stdout: true
      stderr: true
    - description: Building OpenCode config from shared+local
      command: scripts/build_opencode_config
      stdout: true
      stderr: true
    - description: Sourcing .zshrc
      command: source ~/.zshrc
      stdout: true
      stderr: true
    - description: Sourcing .tmux.conf
      command: tmux source-file ~/.tmux.conf
      stdout: true
      stderr: true
- link:
    ~/.zshrc:
      force: true
      path: .zshrc
    ~/.zprofile:
      force: true
      path: .zprofile
    ~/.zsh:
      force: true
      path: .zsh
    ~/.tmux.conf:
      force: true
      path: .tmux.conf
    ~/.Brewfile:
      force: true
      path: .Brewfile
    ~/.config/tmux-powerline/config.sh:
      force: true
      path: tmux-powerline-config.sh
    # OpenCode static (non-merged) shared files. opencode.json, tui.json, and
    # AGENTS.md are not symlinked here — they are produced by
    # scripts/build_opencode_config, which deep-merges JSON configs and
    # concatenates AGENTS.md from opencode/shared/* and opencode/local/*.
    ~/.config/opencode/dcp.jsonc:
      force: true
      path: opencode/shared/dcp.jsonc
    ~/.config/opencode/babel.config.js:
      force: true
      path: opencode/shared/babel.config.js
    ~/.config/opencode/plugin/done-sound.js:
      force: true
      path: opencode/shared/plugin/done-sound.js
